name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_26.app

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v

  lint:
    name: Swift Lint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict Sources Tests || true

  ios-build:
    name: iOS Build Check
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_26.app

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -scheme API \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.3' \
            -derivedDataPath .build/ios \
            | xcpretty || swift build

  macos-build:
    name: macOS Build Check
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_26.app

      - name: Build for macOS
        run: |
          xcodebuild build \
            -scheme API \
            -destination 'platform=macOS' \
            -derivedDataPath .build/macos \
            | xcpretty || swift build
